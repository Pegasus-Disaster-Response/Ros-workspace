# ============================================================
#  Pegasus Integrated System Configuration
#
#  Unified parameters for the A* path planning + obstacle
#  detection + zone-based avoidance system.
# ============================================================

# ── A* Planner ──────────────────────────────────────────────
astar_planner:
  ros__parameters:
    grid_resolution: 0.5          # metres per cell
    heuristic_weight: 1.0         # 1.0 = optimal A*
    max_iterations: 10000
    planning_frequency: 2.0       # Hz
    diagonal_movement: true
    cost_penalty_factor: 15.0
    lethal_cost_threshold: 70
    unknown_cell_cost: 70
    goal_tolerance_m: 3.0
    path_deviation_threshold_m: 5.0
    safety_margin: 3.0            # metres (15ft wingspan UAV)
    min_altitude_m: 5.0
    max_altitude_m: 120.0

# ── Obstacle Avoidance Zones ─────────────────────────────────
obstacle_avoidance:
  safety_margin: 3.0              # metres (15ft wingspan UAV)
  inflation_radius: 9.0           # metres
  critical_zone: 5.0              # metres
  danger_zone: 10.0               # metres
  warning_zone: 20.0              # metres

# ── Costmap ──────────────────────────────────────────────────
costmap:
  ros__parameters:
    grid_size_m: 60.0
    resolution: 0.5
    obstacle_clearance: 3.0
    max_cost: 100
    publish_rate: 2.0             # Hz
    velocity_horizon: 3.0         # seconds for dynamic obstacle projection

# ── Integrated Planning ──────────────────────────────────────
integrated_planning:
  ros__parameters:
    map_size_x: 100.0
    map_size_y: 100.0
    map_size_z: 50.0
    map_resolution: 1.0
    vehicle_inflation: 0.35
    vehicle_min_altitude: 5.0
    vehicle_max_altitude: 120.0
    max_iterations: 80000
    replan_on_obstacle: true
    emergency_replan_distance: 3.0
