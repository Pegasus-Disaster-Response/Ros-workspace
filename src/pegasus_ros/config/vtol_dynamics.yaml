# ============================================================
#  Pegasus VTOL Dynamics Configuration
#
#  Placeholder values based on:
#    - ~50 kg (110 lb) total flight mass
#    - 4.572 m (15 ft) wingspan
#    - Standard VTOL configuration (separate hover + cruise motors)
#    - Multicopter (MC) mode for disaster response mission
#
#  ⚠️  UPDATE THESE with actual aircraft parameters from:
#    - CAD model (mass, CG, inertia)
#    - PX4 params (MPC_ACC_*, MPC_Z_VEL_*, etc.)
#    - Flight test data (if available)
#
#  These values are consumed by:
#    - mpc_trajectory_node (trajectory smoothing + constraints)
#    - obstacle_avoidance_node (emergency maneuver limits) [planned]
#    - mission_planner_node (battery/endurance budgeting) [planned]
# ============================================================

# ── Aircraft Physical Properties ──────────────────────────
vtol:
  mass_kg: 50.0                      # Total flight mass (UPDATE)
  wingspan_m: 4.572                  # 15 ft = 4.572 m
  fuselage_length_m: 2.5             # Approximate (UPDATE from CAD)

  # ── Speed Envelope ─────────────────────────────────────
  max_speed_ms: 20.0                 # Max forward speed in MC mode (UPDATE)
                                      # PX4 param: MPC_XY_VEL_MAX
  min_speed_ms: 0.0                  # MC mode can hover (0 m/s)
                                      # For FW mode, set to stall speed
  cruise_speed_ms: 12.0              # Preferred mission speed (UPDATE)

  # ── Acceleration Limits ────────────────────────────────
  max_accel_ms2: 3.0                 # Max forward acceleration (UPDATE)
                                      # PX4 param: MPC_ACC_HOR_MAX
  max_decel_ms2: 4.0                 # Max deceleration / braking (UPDATE)
                                      # PX4 param: MPC_ACC_HOR_MAX (same param)
  max_jerk_ms3: 8.0                  # Max jerk for smooth trajectories

  # ── Vertical Performance ───────────────────────────────
  max_climb_rate_ms: 3.0             # Max vertical climb (UPDATE)
                                      # PX4 param: MPC_Z_VEL_MAX_UP
  max_descent_rate_ms: 2.0           # Max vertical descent (UPDATE)
                                      # PX4 param: MPC_Z_VEL_MAX_DN
  max_vertical_accel_ms2: 2.0        # Vertical acceleration limit

  # ── Turn Dynamics ──────────────────────────────────────
  max_bank_angle_deg: 30.0           # Max roll angle (UPDATE)
                                      # PX4 param: MPC_MAN_TILT_MAX or MC_ROLL_P
  max_yaw_rate_degs: 60.0            # Max yaw rate (UPDATE)
                                      # PX4 param: MC_YAWRATE_MAX

  # ── Flight Mode ────────────────────────────────────────
  # MC  = multicopter mode (hover capable, can turn in place)
  # FW  = fixed-wing mode (must maintain airspeed, banking turns)
  # TR  = transition (limited maneuverability)
  flight_mode: 'MC'

  # ── VTOL Transition (if applicable) ────────────────────
  transition_time_s: 5.0             # Time to transition MC→FW (UPDATE)
  back_transition_time_s: 3.0        # Time to transition FW→MC (UPDATE)
  transition_airspeed_ms: 15.0       # Required airspeed for transition

# ── MPC Controller Tuning ────────────────────────────────
mpc:
  control_rate_hz: 50.0              # Setpoint output rate (match PX4 offboard)
  horizon_s: 2.0                     # Prediction horizon (seconds)
  horizon_steps: 20                  # Steps within the horizon
  lookahead_m: 15.0                  # How far ahead on the path to consider
  path_smoothing_factor: 0.3         # EMA alpha (0=no smooth, 1=raw path)
  waypoint_reach_tolerance_m: 1.5    # Distance to consider waypoint reached

# ── Altitude Constraints ─────────────────────────────────
altitude:
  min_m: 5.0                         # Floor altitude AGL
  max_m: 120.0                       # FAA Part 107 ceiling

# ── Safety Margins ───────────────────────────────────────
safety:
  min_obstacle_clearance_m: 3.0      # Keep this far from obstacles
  emergency_stop_distance_m: 5.0     # Trigger emergency stop if obstacle closer
  sensor_range_speed_ratio: 0.3      # max_speed = sensor_range * this ratio
                                      # e.g. 100m LiDAR → 30 m/s max

# ── Battery / Endurance (placeholders) ───────────────────
battery:
  capacity_wh: 5000.0                # Total battery capacity (UPDATE)
  reserve_percent: 20.0              # RTL when battery drops below this
  cruise_power_w: 2000.0             # Power draw at cruise speed (UPDATE)
  hover_power_w: 3500.0              # Power draw in hover (UPDATE)