# ============================================================
#  Pegasus Global Path Planner Configuration
#
#  Algorithm: Weighted A* on 2D occupancy grids
#  Architecture: A* (global) → D* Lite (local) → MPC (smooth)
#
#  v2.3.1 changes:
#    - cost_penalty_factor: 5.0 → 15.0 (paths were cutting too close
#      to obstacles; higher value pushes paths further from inflation zones)
#    - unknown_cell_cost: 50 → 70 (more conservative in unknown areas)
# ============================================================

global_planner_node:
  ros__parameters:

    # ── A* Algorithm Tuning ──────────────────────────────
    heuristic_weight: 1.2             # slightly greedy for faster planning
    diagonal_movement: true            # 8-connected
    max_iterations: 100000             # increased for denser maps
    cost_penalty_factor: 30.0          # was 15 — heavier penalty for inflation zone
    lethal_cost_threshold: 60          # was 90 — refuse mid-inflation cells too
    unknown_cell_cost: 70              # more conservative in unknown areas

    # ── Goal Tolerance ───────────────────────────────────
    goal_tolerance_m: 2.0

    # ── Replanning ───────────────────────────────────────
    replan_frequency_hz: 1.0
    path_deviation_threshold_m: 5.0

    # ── UAV Flight Constraints ───────────────────────────
    min_altitude_m: 5.0
    max_altitude_m: 120.0
    min_clearance_m: 3.0

    # ── Grid Selection ───────────────────────────────────
    prefer_local_costmap: true

    # ── Debug / Visualization ────────────────────────────
    publish_visited_grid: false