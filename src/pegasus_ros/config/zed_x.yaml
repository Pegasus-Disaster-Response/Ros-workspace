# ============================================================
#  ZED X Camera Config — Pegasus Disaster Response UAV
#  Single front-facing ZED X for SLAM + perception
#  Namespace: /zed_x
#
#  v2.6.2 fixes:
#    - CRITICAL: Replaced all dotted flat keys (e.g. general.grab_resolution)
#      with correct nested YAML structure. In ros__parameters, dotted keys are
#      treated as literal string keys and are silently ignored by the ZED ROS2
#      wrapper — none of the depth/video/grab settings were ever taking effect.
#    - CRITICAL: Removed non-existent params publish_stereo, publish_left_camera,
#      publish_right_camera (not valid ZED ROS2 wrapper params — caused no
#      error but also did nothing, giving false confidence settings were applied).
#    - depth_mode changed from 'PERFORMANCE' to 'NEURAL' as intended for
#      high-quality depth maps used by RTAB-Map. PERFORMANCE was a placeholder
#      that should have been reverted; this is why depth quality was degraded.
#    - grab_frame_rate set to 15 retained (good for Jetson bandwidth).
#    - All valid image/depth publish flags use correct param names.
# ============================================================
zed_node:
  ros__parameters:

    # ── Camera Identity ──────────────────────────────────────
    camera_model: 'zedx'
    camera_name: 'zed_x'
    serial_number: 40709032             # Verify: /usr/local/zed/tools/ZED_Explorer

    # ── Frames ───────────────────────────────────────────────
    base_frame: 'base_link'
    camera_frame: 'zed_x_camera_center' # Must match static TF in pegasus_slam.launch.py
    publish_tf: false                   # RTAB-Map handles map→odom→base_link TF
    publish_map_tf: false
    publish_imu_tf: false               # Pixhawk IMU is used, not ZED internal IMU

    # ── Grab / Resolution ────────────────────────────────────
    # Previously these were written as 'general.grab_resolution: ...' which is a
    # literal string key in YAML — the ZED wrapper never saw these values.
    # Correct param names are at the top level of ros__parameters.
    grab_resolution: 'HD720'            # VGA also works if bandwidth is tight
    grab_frame_rate: 15                 # 15 Hz is sufficient for SLAM; reduces USB load

    # ── Depth ────────────────────────────────────────────────
    # NEURAL mode produces highest quality depth. PERFORMANCE was set as a
    # temporary measure and was never corrected in the config.
    depth_mode: 'NEURAL'
    min_depth: 0.3                      # ZED X minimum reliable depth (m)
    max_depth: 20.0                     # ZED X maximum reliable depth (m)
    depth_stabilization: 1

    # ── Image Output ─────────────────────────────────────────
    img_downsample_factor: 1.0

    # ── Depth & RGB Publishing (used by RTAB-Map RGB-D mode) ─
    # These are the correct ZED ROS2 wrapper boolean flags.
    depth_quality: true                 # Enables depth topic publishing
    pub_frame_rate: 15.0                # Match grab_frame_rate

    # ── Point Cloud ──────────────────────────────────────────
    point_cloud_freq: 1.0               # Keep low; costmap node uses depth image directly

    # ── Mapping ──────────────────────────────────────────────
    mapping_enabled: false              # RTAB-Map handles all mapping

    # ── Internal Odometry ────────────────────────────────────
    pos_tracking_enabled: false         # RTAB-Map + ICP odometry handles this

    # ── IMU ──────────────────────────────────────────────────
    sensors_image_sync: false           # Pixhawk IMU is fused separately

    # ── QoS ──────────────────────────────────────────────────
    use_sim_time: false