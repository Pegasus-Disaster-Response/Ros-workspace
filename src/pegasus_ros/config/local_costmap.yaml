# ============================================================
#  Pegasus 3D Local Costmap Configuration (v2)
#  Fuses VLP-16 LiDAR + ZED X depth into a rolling 3D voxel grid
#
#  v2 additions: raycasting, speed-adaptive decay, inflation
#  publishing, costmap metadata
# ============================================================

local_costmap_node:
  ros__parameters:

    # ── Voxel Grid Geometry ────────────────────────────
    costmap:
      size_x_m: 40.0                  # total X dimension of the grid
      size_y_m: 40.0                  # total Y dimension
      size_z_m: 20.0                  # vertical extent (important for UAV)
      resolution_m: 0.3               # voxel edge length (0.3m = good tradeoff)
      origin_frame: "base_link"       # costmap centered on this frame

    # ── LiDAR Costmap Layer ────────────────────────────
    lidar:
      enabled: true
      topic: "/velodyne_points"
      timeout_ms: 500
      frame_id: "velodyne"
      range_min_m: 0.5
      range_max_m: 50.0
      voxel_size_m: 0.2
      ground_removal:
        enabled: true
        height_m: 0.3
      height_band:
        min_m: -2.0
        max_m: 15.0
      min_points_for_obstacle: 3

    # ── ZED X Depth Costmap Layer ──────────────────────
    zed_depth:
      enabled: true
      topic: "/zed_x/zed_node/depth/depth_registered"
      camera_info_topic: "/zed_x/zed_node/rgb/camera_info"
      timeout_ms: 500
      frame_id: "zed_x_camera_center"
      range_min_m: 0.5
      range_max_m: 15.0
      downsample_factor: 4
      height_band:
        min_m: -2.0
        max_m: 15.0
      min_points_for_obstacle: 8

    # ── Fusion & Decay ─────────────────────────────────
    fusion:
      obstacle_persistence_s: 2.0     # base decay time at rest
      decay_check_hz: 2.0             # how often to sweep stale voxels
      max_ghost_distance_m: 3.0       # at speed, ghosts clear within this distance
                                       # persistence = max_ghost_distance / speed
                                       # at 20 m/s → 0.15s, at 5 m/s → 0.6s
      raycasting_enabled: true         # mark voxels along sensor rays as FREE
                                       # set false to save CPU if not needed
      unknown_cost: -1
      free_cost: 0
      occupied_cost: 100

    # ── Inflation ──────────────────────────────────────
    inflation:
      radius_m: 3.0                   # safety buffer around obstacles
                                       # should be >= half wingspan (15ft/2 ≈ 2.3m)
      cost_scaling_factor: 5.0        # exponential dropoff steepness
                                       # higher = sharper dropoff, tighter paths

    # ── Sensor Health / Degraded Modes ─────────────────
    degraded_modes:
      lidar_only:
        safety_margin_multiplier: 1.5
        max_speed_m_s: 20.0
      camera_only:
        safety_margin_multiplier: 2.0
        max_speed_m_s: 10.0
        restrict_to_forward: true
        request_rtl_after_s: 30.0
      all_degraded:
        action: "emergency_loiter"
        max_duration_s: 60.0

    # ── Publishing ─────────────────────────────────────
    publish:
      rate_hz: 10.0
      costmap_topic: "/pegasus/local_costmap"
      inflated_topic: "/pegasus/local_costmap_inflated"
      marker_topic: "/pegasus/local_costmap_markers"
      publish_2d_projection: true
      projection_topic: "/pegasus/local_costmap_2d"
      projection_height_m: 0.0        # slice at base_link height
      metadata_topic: "/pegasus/costmap_metadata"