# ============================================================
#  Pegasus 3D Local Costmap Configuration (v2.4)
#  Fuses VLP-16 LiDAR + ZED X depth into a rolling 3D voxel grid
#
#  v2.4: Added 3D grid publishing for D* Lite 3D planner.
# ============================================================

local_costmap_node:
  ros__parameters:

    # ── Voxel Grid Geometry ────────────────────────────
    costmap:
      size_x_m: 40.0
      size_y_m: 40.0
      size_z_m: 20.0
      resolution_m: 0.3
      origin_frame: "base_link"

    # ── LiDAR Costmap Layer ────────────────────────────
    lidar:
      enabled: true
      topic: "/velodyne_points"
      timeout_ms: 500
      frame_id: "velodyne"
      range_min_m: 0.5
      range_max_m: 50.0
      voxel_size_m: 0.2
      ground_removal:
        enabled: true
        height_m: 0.3
        ransac_iterations: 50
        candidate_z_band_m: 0.5
      height_band:
        min_m: -2.0
        max_m: 15.0
      min_points_for_obstacle: 3

    # ── ZED X Depth Costmap Layer ──────────────────────
    zed_depth:
      enabled: true
      topic: "/zed_x/zed_node/depth/depth_registered"
      camera_info_topic: "/zed_x/zed_node/rgb/color/rect/camera_info"
      frame_id: "zed_x_camera_center"
      range_min_m: 0.5
      range_max_m: 15.0
      downsample_factor: 4
      height_band:
        min_m: -2.0
        max_m: 15.0
      min_points_for_obstacle: 8

    # ── Fusion & Decay ─────────────────────────────────
    fusion:
      obstacle_persistence_s: 5.0
      decay_check_hz: 1.0
      max_ghost_distance_m: 3.0
      raycasting_enabled: true
      unknown_cost: -1
      free_cost: 0
      occupied_cost: 100

    # ── Inflation ──────────────────────────────────────
    # radius_m: how far the inflation zone extends from each obstacle.
    # cost_scaling_factor: how fast cost decays. With scaling=5, cost
    # falls below 60 within 0.2 m of the obstacle, leaving most of the
    # 5 m inflation in the planner's "low cost, traversable with
    # penalty" range. Dropping to 1.0 keeps cost > 60 across the inner
    # ~2.5 m of inflation, which (combined with the planner's lower
    # lethal threshold) makes the planner actually treat this band
    # as no-go.
    inflation:
      radius_m: 5.0
      cost_scaling_factor: 1.0

    # ── Sensor Health / Degraded Modes ─────────────────
    degraded_modes:
      lidar_only:
        safety_margin_multiplier: 1.5
        max_speed_m_s: 20.0
      camera_only:
        safety_margin_multiplier: 2.0
        max_speed_m_s: 10.0
        restrict_to_forward: true
        request_rtl_after_s: 30.0
      all_degraded:
        action: "emergency_loiter"
        max_duration_s: 60.0

    # ── Publishing ─────────────────────────────────────
    publish:
      rate_hz: 10.0
      costmap_topic: "/pegasus/local_costmap"
      inflated_topic: "/pegasus/local_costmap_inflated"
      marker_topic: "/pegasus/local_costmap_markers"
      publish_2d_projection: true
      projection_topic: "/pegasus/local_costmap_2d"
      projection_height_m: 0.0
      metadata_topic: "/pegasus/costmap_metadata"
      # NEW v2.4: Full 3D grid for D* Lite 3D planner
      publish_3d_grid: true
      grid_3d_topic: "/pegasus/local_costmap_3d_grid"
      grid_3d_rate_hz: 5.0            # Lower than costmap pub rate — 3D grid is large