# ============================================================
#  RTAB-Map SLAM Configuration — Pegasus Disaster Response UAV
#  Sensors: VLP-16 LiDAR + Pixhawk IMU (ZED X temporarily disabled)
#
#  v2.3 changes:
#    - Odometry-specific params moved to icp_odometry.yaml and
#      rgbd_odometry.yaml (Fix #3).
#    - Icp/MaxCorrespondenceDistance increased to 1.0 (Fix #5).
#    - Stereo fallback params removed (not used in RGB-D mode).
#
#  v2.6.3 changes (LiDAR-only mode):
#    - FIX: subscribe_scan_cloud confirmed true, subscribe_depth/rgb
#      confirmed false — LiDAR-only SLAM is now the active mode.
#    - FIX: Grid/Sensor changed from 2 (both) to 0 (laser only).
#      With ZED disabled, keeping Grid/Sensor=2 causes RTAB-Map to
#      wait for depth camera input that never arrives before updating
#      the occupancy grid, resulting in a map that never fills.
#    - FIX: cloud_min_depth and cloud_max_depth removed — these are
#      depth camera parameters that have no effect in scan_cloud mode
#      and were causing a YAML parse error due to a missing newline
#      at the end of the file (cloud_min_depth: 0.3 was the last line
#      with no trailing newline, corrupting the param block).
#    - FIX: subscribe_imu changed to false. With wait_imu_to_init=false
#      the ICP odometry node was still receiving IMU callbacks and
#      asserting on uninitialized gravity vector, causing SIGABRT.
#      Re-enable when ZED is back and full RGB-D+IMU fusion is needed.
#
#  This file is loaded by the RTAB-Map SLAM node (mapping +
#  localization) and rtabmap_viz. Odometry nodes load their own
#  dedicated config files instead.
# ============================================================

rtabmap:
  ros__parameters:

    # ── Core SLAM ────────────────────────────────────────────
    Rtabmap/DetectionRate: "1"
    Rtabmap/TimeThr: "700"
    Rtabmap/MemoryThr: "0"
    Rtabmap/LoopThr: "0.11"

    # ── Memory ───────────────────────────────────────────────
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Mem/STMSize: "30"
    Mem/UseOdomGravity: "false"       # Disabled: no IMU in LiDAR-only mode

    # ── ICP LiDAR (used by RTAB-Map for loop closure verification) ──
    Icp/VoxelSize: "0.3"
    Icp/MaxCorrespondenceDistance: "1.0"
    Icp/PointToPlane: "true"
    Icp/Iterations: "30"
    Icp/MaxTranslation: "1.0"
    Icp/CorrespondenceRatio: "0.01"

    # ── Proximity / Loop Closure ─────────────────────────────
    RGBD/ProximityBySpace: "true"
    RGBD/AngularUpdate: "0.05"
    RGBD/LinearUpdate: "0.1"
    RGBD/LoopClosureIdentityGuess: "true"
    RGBD/NewMapOdomChangeDistance: "0"
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/OptimizeMaxError: "3.0"

    # ── Graph Optimization ───────────────────────────────────
    Optimizer/Strategy: "1"           # 1=g2o
    Optimizer/Epsilon: "0.00001"
    Optimizer/Iterations: "100"
    Optimizer/Robust: "true"

    # ── 3D Grid / Occupancy Map ──────────────────────────────
    Grid/Sensor: "0"                  # FIX v2.6.3: 0=laser only (was 2=both)
    Grid/3D: "true"
    Grid/CellSize: "0.05"
    Grid/RangeMax: "30.0"
    Grid/RangeMin: "0.5"
    Grid/MaxObstacleHeight: "2.0"
    Grid/MaxGroundHeight: "0.1"
    Grid/RayTracing: "true"
    Grid/ClusterRadius: "0.1"
    Grid/GroundIsObstacle: "false"

    # ── Visual Features ──────────────────────────────────────
    Kp/MaxFeatures: "500"
    Vis/MaxFeatures: "1000"
    Vis/MinInliers: "15"
    Vis/InlierDistance: "0.1"
    SURF/HessianThreshold: "300"

    # ── Subscription Modes ───────────────────────────────────
    subscribe_rgb: false
    subscribe_depth: false
    subscribe_stereo: false
    subscribe_scan_cloud: true
    subscribe_scan: false
    subscribe_imu: false              # FIX v2.6.3: disabled in LiDAR-only mode

    # ── Sync ─────────────────────────────────────────────────
    approx_sync: true
    approx_sync_max_interval: 0.5
    queue_size: 30
    wait_imu_to_init: false

    # ── Point Cloud Output ───────────────────────────────────
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true

























































































































































    