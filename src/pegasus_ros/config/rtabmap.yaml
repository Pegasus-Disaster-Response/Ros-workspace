# ============================================================
#  RTAB-Map SLAM Configuration — Pegasus Disaster Response UAV
#  Sensors: VLP-16 LiDAR + Pixhawk IMU  (LiDAR-only mode)
#
#  v3.0 changes (LiDAR-only mode):
#    - subscribe_rgb / subscribe_depth disabled. ZED X is no longer
#      consumed by SLAM; it is kept running in the sensors launch
#      for visualization and future RGB-D fallback only.
#    - Reg/Strategy = 1 (ICP) for all registration including loop
#      closure verification. Visual BoW disabled (Kp/MaxFeatures=0).
#    - RGBD/ProximityBySpace = true so loop closures fire from
#      geometric proximity rather than visual word matches.
#    - Grid/Sensor = 0 (LiDAR only) for occupancy grid.
#    - Icp/VoxelSize tightened from 0.3 to 0.1 for indoor detail.
#    - IMU still subscribed for gravity alignment in pose graph
#      optimization (Optimizer/GravitySigma).
# ============================================================

/rtabmap/rtabmap:
  ros__parameters:

    # ── Core SLAM ────────────────────────────────────────────
    Rtabmap/DetectionRate: "3"
    Rtabmap/TimeThr: "700"
    Rtabmap/MemoryThr: "0"
    Rtabmap/LoopThr: "0.11"

    # ── Memory ───────────────────────────────────────────────
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Mem/STMSize: "30"
    Mem/UseOdomGravity: "true"        # Re-enabled for IMU gravity alignment

    # ── Registration Strategy ────────────────────────────────
    Reg/Strategy: "1"                 # 1=ICP only (no visual BoW for loop closure)
    Reg/Force3DoF: "false"            # 6DoF — UAV pitches/rolls

    # ── ICP (used for both odometry verification and loop closure) ──
    Icp/VoxelSize: "0.1"              # 10 cm — tighter than 0.3 for indoor detail
    Icp/MaxCorrespondenceDistance: "1.0"
    Icp/PointToPlane: "true"
    Icp/Iterations: "30"
    Icp/MaxTranslation: "1.0"
    Icp/CorrespondenceRatio: "0.01"

    # ── Proximity / Loop Closure ─────────────────────────────
    RGBD/ProximityBySpace: "true"     # CRITICAL in lidar-only — loop closures
                                      # come from geometric proximity, not BoW
    RGBD/ProximityPathMaxNeighbors: "10"
    RGBD/LoopClosureReextractFeatures: "false"  # No visual features to extract
    RGBD/AngularUpdate: "0.1"         # ~6° before adding new node
    RGBD/LinearUpdate: "0.1"          # 10 cm before adding new node
    RGBD/LoopClosureIdentityGuess: "true"
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/OptimizeMaxError: "3.0"

    # ── Graph Optimization ───────────────────────────────────
    Optimizer/Strategy: "1"           # 1=g2o
    Optimizer/Epsilon: "0.00001"
    Optimizer/Iterations: "100"
    Optimizer/Robust: "true"
    Optimizer/GravitySigma: "0.3"     # IMU gravity constraint in pose graph

    # ── 3D Grid / Occupancy Map ──────────────────────────────
    Grid/Sensor: "0"                  # 0=LiDAR only (was 2 = both)
    Grid/3D: "true"
    Grid/CellSize: "0.05"
    Grid/RangeMax: "30.0"
    Grid/RangeMin: "0.5"
    Grid/MaxObstacleHeight: "2.0"
    Grid/MaxGroundHeight: "0.1"
    Grid/RayTracing: "true"
    Grid/ClusterRadius: "0.1"
    Grid/GroundIsObstacle: "false"

    # ── Visual Features (DISABLED — lidar-only mode) ─────────
    Kp/MaxFeatures: "0"               # 0 = no visual bag-of-words

    # ── Subscription Modes ───────────────────────────────────
    subscribe_rgb: false              # ZED X not consumed by SLAM
    subscribe_depth: false
    subscribe_rgbd: false
    subscribe_stereo: false
    subscribe_scan_cloud: true        # VLP-16 point cloud
    subscribe_scan: false
    subscribe_imu: false              # Gravity comes via odom (Mem/UseOdomGravity)
                                      # — icp_odometry already aligns to IMU and
                                      # embeds the gravity-aligned orientation in
                                      # its odom output. Subscribing to IMU here
                                      # too adds it to the sync, and if the bridge
                                      # has no valid orientation quaternion,
                                      # wait_imu_to_init never fires and zero nodes
                                      # are added.

    # ── Sync ─────────────────────────────────────────────────
    approx_sync: true
    approx_sync_max_interval: 0.5
    queue_size: 30
    wait_imu_to_init: false           # No IMU sub here — handled at odom layer

    # ── Point Cloud Output ───────────────────────────────────
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true