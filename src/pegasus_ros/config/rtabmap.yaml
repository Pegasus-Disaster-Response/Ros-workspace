# ============================================================
#  RTAB-Map SLAM Configuration — Pegasus Disaster Response UAV
#  Sensors: VLP-16 LiDAR + ZED X (RGB-D) + Pixhawk IMU
#
#  v2.7 changes (Full Multi-Sensor Mode):
#    - Re-enabled subscribe_rgb, subscribe_depth, subscribe_imu
#      to allow RTAB-Map to use both LiDAR and ZED X data.
#    - Grid/Sensor changed back to 2 (both LiDAR and depth camera)
#      so the occupancy grid is populated by both sensor streams.
#    - Mem/UseOdomGravity re-enabled for IMU gravity alignment.
#    - wait_imu_to_init set to TRUE. This is the critical fix for
#      the SIGABRT crash seen in v2.6.3: the ICP odometry node
#      was asserting on an uninitialized gravity vector because
#      subscribe_imu was true but wait_imu_to_init was false.
#      Setting wait_imu_to_init=true makes the node wait for
#      valid IMU data before processing scans, preventing the
#      assertion failure entirely.
#    - approx_sync_max_interval kept at 0.5 to handle timing
#      differences between LiDAR (10 Hz), ZED (15 Hz), and IMU
#      (50 Hz) streams.
#
#  This file is loaded by the RTAB-Map SLAM node (mapping +
#  localization) and rtabmap_viz. Odometry nodes load their own
#  dedicated config files instead.
# ============================================================

rtabmap:
  ros__parameters:

    # ── Core SLAM ────────────────────────────────────────────
    Rtabmap/DetectionRate: "1"
    Rtabmap/TimeThr: "700"
    Rtabmap/MemoryThr: "0"
    Rtabmap/LoopThr: "0.11"

    # ── Memory ───────────────────────────────────────────────
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Mem/STMSize: "30"
    Mem/UseOdomGravity: "true"        # Re-enabled for IMU gravity alignment

    # ── ICP LiDAR (used by RTAB-Map for loop closure verification) ──
    Icp/VoxelSize: "0.3"
    Icp/MaxCorrespondenceDistance: "1.0"
    Icp/PointToPlane: "true"
    Icp/Iterations: "30"
    Icp/MaxTranslation: "1.0"
    Icp/CorrespondenceRatio: "0.01"

    # ── Proximity / Loop Closure ─────────────────────────────
    RGBD/ProximityBySpace: "true"
    RGBD/AngularUpdate: "0.05"
    RGBD/LinearUpdate: "0.1"
    RGBD/LoopClosureIdentityGuess: "true"
    RGBD/NewMapOdomChangeDistance: "0"
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/OptimizeMaxError: "3.0"

    # ── Graph Optimization ───────────────────────────────────
    Optimizer/Strategy: "1"           # 1=g2o
    Optimizer/Epsilon: "0.00001"
    Optimizer/Iterations: "100"
    Optimizer/Robust: "true"

    # ── 3D Grid / Occupancy Map ──────────────────────────────
    Grid/Sensor: "2"                  # 2=both LiDAR and depth camera
    Grid/3D: "true"
    Grid/CellSize: "0.05"
    Grid/RangeMax: "30.0"
    Grid/RangeMin: "0.5"
    Grid/MaxObstacleHeight: "2.0"
    Grid/MaxGroundHeight: "0.1"
    Grid/RayTracing: "true"
    Grid/ClusterRadius: "0.1"
    Grid/GroundIsObstacle: "false"

    # ── Visual Features ──────────────────────────────────────
    Kp/MaxFeatures: "500"
    Vis/MaxFeatures: "1000"
    Vis/MinInliers: "15"
    Vis/InlierDistance: "0.1"
    SURF/HessianThreshold: "300"

    # ── Subscription Modes ───────────────────────────────────
    subscribe_rgb: true               # ZED X RGB for visual loop closure
    subscribe_depth: true             # ZED X depth for RGB-D mapping
    subscribe_stereo: false
    subscribe_scan_cloud: true        # VLP-16 point cloud for ICP
    subscribe_scan: false
    subscribe_imu: true               # Pixhawk IMU via bridge node

    # ── Sync ─────────────────────────────────────────────────
    approx_sync: true
    approx_sync_max_interval: 0.5     # Handles LiDAR 10Hz + ZED 15Hz + IMU 50Hz
    queue_size: 30
    wait_imu_to_init: true            # CRITICAL: must be true when subscribe_imu
                                      # is true, otherwise SIGABRT on gravity assert

    # ── Point Cloud Output ───────────────────────────────────
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true

    # ── Depth Camera Parameters (ZED X) ──────────────────────
    cloud_min_depth: 0.3              # ZED X minimum reliable depth
    cloud_max_depth: 20.0             # ZED X maximum reliable depth