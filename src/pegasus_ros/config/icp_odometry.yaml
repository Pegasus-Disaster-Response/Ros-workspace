# ============================================================
#  ICP LiDAR Odometry Configuration — Pegasus Disaster Response UAV
#  Loaded by: icp_odometry node in pegasus_slam.launch.py
#
#  Fix #3: Subscription parameters must be under the correct node
#  name (icp_odometry) so the node actually picks them up. Previously
#  these were only under 'rtabmap:' in rtabmap.yaml, which doesn't
#  match the icp_odometry node name — so subscribe_scan_cloud was
#  never set to true and the node wasn't subscribing to LiDAR data.
#
#  Fix #5: Icp/MaxCorrespondenceDistance increased from 0.15 to 1.0.
#  With VoxelSize=0.3, voxel centers are at least 0.3m apart, so a
#  MaxCorrespondenceDistance of 0.15 would reject most valid matches.
# ============================================================

icp_odometry:
  ros__parameters:

    # ── Subscription Modes ──────────────────────────────────
    subscribe_scan_cloud: true
    subscribe_scan: false
    subscribe_rgb: false
    subscribe_depth: false
    subscribe_stereo: false

    # ── ICP Parameters ──────────────────────────────────────
    Icp/VoxelSize: "0.3"              # Outdoor: 0.3m voxels
    Icp/MaxCorrespondenceDistance: "2.0"  # Increased for SITL lower frame rate
    Icp/PointToPlane: "true"
    Icp/Iterations: "30"
    Icp/MaxTranslation: "5.0"         # SITL: drone moves more between frames at low sim rate
    Icp/CorrespondenceRatio: "0.005"  # Lowered: fewer points match at distance in sim

    # ── Odometry Strategy ───────────────────────────────────
    Odom/Strategy: "0"                # Frame-to-Map

    # ── Sync ────────────────────────────────────────────────
    approx_sync: true
    approx_sync_max_interval: 0.5
    queue_size: 30
    wait_imu_to_init: false