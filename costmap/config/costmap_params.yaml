costmap_node:
  ros__parameters:
    # ── Grid dimensions ───────────────────────────────────────────────────
    grid_size_m: 60.0         # Costmap side length (metres) — centred on UAV
    resolution: 0.5           # Metres per cell (finer = more accurate, more compute)

    # ── Inflation model ───────────────────────────────────────────────────
    obstacle_clearance: 3.0   # Base Gaussian sigma (metres)
    max_cost: 100             # Lethal cost ceiling

    # ── Dynamic obstacle projection ───────────────────────────────────────
    velocity_horizon: 3.0     # Seconds to project a moving obstacle forward

    # ── Performance ───────────────────────────────────────────────────────
    publish_rate: 2.0         # Background publish rate (Hz)

    # ── Topics ────────────────────────────────────────────────────────────
    lidar_topic: "/lidar/points"

    # ── Inflation sigma scaling per avoidance zone ────────────────────────
    #   Zone             sigma = obstacle_clearance * scale
    #   EMERGENCY_HOVER  1.0×  (tightest inflation — snap around obstacles)
    #   HARD_AVOID       1.0×
    #   REROUTE          1.5×
    #   ADJUST_HEADING   2.0×  (widest inflation — gentle heading nudge)
    #   NORMAL_FLIGHT    2.0×
    #
    # These scales are compiled into the node; adjust ZONE_SIGMA_SCALE in
    # costmap_node.py if different values are needed.
